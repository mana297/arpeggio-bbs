<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content"/>
  <title>ARPEGGIO BBS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body {
      background: #050905;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Share Tech Mono', monospace;
      color: #a8c8a8;
    }
    .container {
      width: 100%;
      max-width: 760px;
      height: 100dvh;
      background: #080c08;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }
    .scanline {
      position: fixed;
      top:0;left:0;right:0;bottom:0;
      background: repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.04) 2px,rgba(0,0,0,0.04) 4px);
      pointer-events: none;
      z-index: 100;
    }
    .header {
      background: #060b06;
      border-bottom: 1px solid #1e2e1e;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    .logo { font-family:'VT323',monospace; font-size:28px; color:#6dbd6d; letter-spacing:5px; }
    .subtitle { font-size:10px; color:#2e4e2e; letter-spacing:2px; }
    .status-dot {
      width:7px;height:7px;border-radius:50%;background:#4a9a4a;margin-left:auto;
      box-shadow:0 0 8px #4a9a4a;animation:blink 2s infinite;display:none;
    }
    @keyframes blink { 0%,100%{opacity:1}50%{opacity:0.3} }

    .screen { display:none; flex:1; min-height:0; }
    .screen.active { display:flex; }

    #pwScreen {
      flex-direction:column;align-items:center;justify-content:center;
      gap:24px;padding:40px 20px;overflow-y:auto;
    }
    .pw-title { font-family:'VT323',monospace; font-size:64px; color:#5aaa5a; letter-spacing:10px; text-shadow:0 0 30px rgba(90,170,90,0.25); }
    .pw-desc { font-size:11px; color:#2e4e2e; letter-spacing:2px; text-align:center; line-height:2; }
    .pw-form { display:flex; flex-direction:column; gap:12px; width:100%; max-width:340px; }
    .field-label { font-size:10px; color:#2e4e2e; letter-spacing:3px; }
    .field-label span { color:#1e3e1e; font-size:9px; }

    .pw-input-wrap { position:relative; display:flex; align-items:center; }
    .pw-input-wrap input { flex:1; padding-right:44px; }
    .toggle-btn {
      position:absolute;right:0;height:100%;width:40px;
      background:transparent;border:none;color:#3a6a3a;cursor:pointer;
      font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:0;
      display:flex;align-items:center;justify-content:center;transition:color 0.2s;
    }
    .toggle-btn:hover { color:#6dbd6d; }

    input[type="password"], input[type="text"] {
      width:100%;background:#0a120a;border:1px solid #1e3e1e;
      color:#7dbd7d;font-family:'Share Tech Mono',monospace;
      font-size:15px;padding:10px 14px;outline:none;transition:border-color 0.2s;
    }
    input[type="password"] { letter-spacing:5px; }
    input[type="text"].nick { letter-spacing:1px; }
    input:focus { border-color:#3a7a3a; }
    .divider { border:none; border-top:1px solid #1a2e1a; margin:4px 0; }
    .err-msg { font-size:11px; color:#7a3030; letter-spacing:2px; min-height:16px; text-align:center; }
    .enter-btn {
      width:100%;background:transparent;border:1px solid #2e5e2e;color:#6dbd6d;
      font-family:'Share Tech Mono',monospace;font-size:13px;letter-spacing:4px;
      padding:11px;cursor:pointer;transition:all 0.2s;
    }
    .enter-btn:hover { background:#0f1e0f; border-color:#4a8a4a; }

    #chatScreen { flex-direction:column; min-height:0; }
    .info-bar {
      background:#060b06;border-bottom:1px solid #1a2e1a;padding:6px 18px;
      display:flex;gap:14px;align-items:center;font-size:10px;color:#2e4e2e;
      letter-spacing:1px;flex-shrink:0;
    }
    .info-bar .my-name { color:#6dbd6d; }
    .info-bar .online { margin-left:auto; }

    .messages {
      flex:1;overflow-y:auto;padding:14px 18px;
      display:flex;flex-direction:column;gap:5px;
      scrollbar-width:thin;scrollbar-color:#1a3a1a #080c08;
      min-height:0;-webkit-overflow-scrolling:touch;
    }
    .msg { display:flex;gap:10px;align-items:flex-start;animation:appear 0.18s ease; }
    @keyframes appear { from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:none} }
    .msg-time { font-size:10px;color:#1e3e1e;min-width:46px;padding-top:2px;flex-shrink:0; }
    .msg-name { font-size:11px;min-width:100px;max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding-top:2px;flex-shrink:0; }
    .msg-name.me { color:#6dbd6d; }
    .msg-name.other { color:#3e6e3e; }
    .msg-name.sys { color:#2e4e5e; }
    .msg-body { font-size:13px;color:#7aaa7a;line-height:1.55;word-break:break-word; }
    .msg-body.sys { color:#2e4e5e;font-size:11px;font-style:italic; }

    .input-area {
      border-top:1px solid #1a2e1a;padding:10px 16px;
      display:flex;gap:8px;background:#060b06;flex-shrink:0;
    }
    .chat-input {
      flex:1;background:#0a120a;border:1px solid #1e3e1e;color:#8ab88a;
      font-family:'Share Tech Mono',monospace;font-size:13px;padding:8px 12px;outline:none;min-width:0;
    }
    .chat-input:focus { border-color:#3a6a3a; }
    .send-btn {
      background:transparent;border:1px solid #2e5e2e;color:#6dbd6d;
      font-family:'Share Tech Mono',monospace;font-size:12px;letter-spacing:2px;
      padding:8px 16px;cursor:pointer;transition:all 0.15s;flex-shrink:0;
    }
    .send-btn:hover { background:#0f1e0f; }

    @media (max-width:480px) {
      .pw-title { font-size:48px; letter-spacing:6px; }
      .msg-name { min-width:76px; max-width:76px; }
      .send-btn { padding:8px 10px; letter-spacing:1px; }
    }
  </style>
</head>
<body>
<div class="scanline"></div>
<div class="container">

  <div class="header">
    <div>
      <div class="logo">ARPEGGIO</div>
      <div class="subtitle">ANONYMOUS COMMUNITY BULLETIN BOARD</div>
    </div>
    <div class="status-dot" id="dot"></div>
  </div>

  <div class="screen active" id="pwScreen">
    <div class="pw-title">ARPEGGIO</div>
    <div class="pw-desc">THIS SITE IS OPEN TO ANYONE<br>WHO KNOWS THE PASSWORD</div>
    <div class="pw-form">
      <div class="field-label">&gt; PASSWORD</div>
      <div class="pw-input-wrap">
        <input type="password" id="pwInput" placeholder="enter password..." autocomplete="off"/>
        <button class="toggle-btn" id="toggleBtn" tabindex="-1">SHOW</button>
      </div>
      <hr class="divider"/>
      <div class="field-label">&gt; NICKNAME <span>( OPTIONAL )</span></div>
      <input type="text" class="nick" id="nickInput" placeholder="未設定の場合は自動割り当て" maxlength="20" autocomplete="off"/>
      <div class="err-msg" id="errMsg"></div>
      <button class="enter-btn" id="enterBtn">[ ENTER ]</button>
    </div>
  </div>

  <div class="screen" id="chatScreen">
    <div class="info-bar">
      <span>ARPEGGIO BBS</span>
      <span>|</span>
      <span>YOU: <span class="my-name" id="myNameDisp"></span></span>
      <span class="online" id="onlineCount">ONLINE: —</span>
    </div>
    <div class="messages" id="msgs"></div>
    <div class="input-area">
      <input class="chat-input" type="text" id="chatInput" placeholder="メッセージを入力..." maxlength="200"/>
      <button class="send-btn" id="sendBtn">SEND</button>
    </div>
  </div>

</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, push, onValue, serverTimestamp, onDisconnect, set }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCZKSGamG9fW93bYbRcoIPYEFIx7wrDLsE",
    authDomain: "arpeggio-bbs.firebaseapp.com",
    databaseURL: "https://arpeggio-bbs-default-rtdb.firebaseio.com",
    projectId: "arpeggio-bbs",
    storageBucket: "arpeggio-bbs.firebasestorage.app",
    messagingSenderId: "155564356931",
    appId: "1:155564356931:web:b2b82d9ff90d19a6a22bf6"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getDatabase(app);

  const adj  = ['Silent','Shadow','Phantom','Hollow','Neon','Crimson','Azure','Void'];
  const noun = ['Walker','Ghost','Drifter','Signal','Echo','Cipher','Specter','Node'];
  function randomId() {
    return adj[Math.floor(Math.random()*adj.length)]+noun[Math.floor(Math.random()*noun.length)]+'_'+(Math.floor(Math.random()*900)+100);
  }

  let myName = '';

  function fmt() {
    const d = new Date();
    return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
  }

  function addMsg(name, text, isMe, isSys) {
    const msgs = document.getElementById('msgs');
    const row = document.createElement('div'); row.className='msg';
    const t = document.createElement('div'); t.className='msg-time'; t.textContent=fmt();
    const n = document.createElement('div'); n.className='msg-name '+(isSys?'sys':isMe?'me':'other'); n.textContent=isSys?'SYSTEM':name;
    const b = document.createElement('div'); b.className='msg-body'+(isSys?' sys':''); b.textContent=text;
    row.appendChild(t); row.appendChild(n); row.appendChild(b);
    msgs.appendChild(row);
    msgs.scrollTop = msgs.scrollHeight;
  }

  // パスワード表示切り替え
  const pwInput = document.getElementById('pwInput');
  const toggleBtn = document.getElementById('toggleBtn');
  toggleBtn.addEventListener('click', () => {
    const hide = pwInput.type === 'password';
    pwInput.type = hide ? 'text' : 'password';
    toggleBtn.textContent = hide ? 'HIDE' : 'SHOW';
  });

  // 入室
  function enter() {
    const pw   = pwInput.value.trim().toLowerCase();
    const nick = document.getElementById('nickInput').value.trim();
    if (pw !== 'arpeggio') {
      document.getElementById('errMsg').textContent = '// INVALID PASSWORD';
      pwInput.value = '';
      return;
    }
    myName = nick || randomId();
    document.getElementById('pwScreen').classList.remove('active');
    document.getElementById('chatScreen').classList.add('active');
    document.getElementById('dot').style.display = 'block';
    document.getElementById('myNameDisp').textContent = myName;

    addMsg('','ARPEGGIOに接続しました。',false,true);
    addMsg('','あなたのIDは '+myName+' です。',false,true);

    const presencePath = ref(db,'presence/'+myName+'_'+Date.now());
    set(presencePath,{name:myName,online:true});
    onDisconnect(presencePath).remove();
    onValue(ref(db,'presence'), snap=>{
      document.getElementById('onlineCount').textContent='ONLINE:'+(snap.exists()?Object.keys(snap.val()).length:0);
    });

    onValue(ref(db,'messages'), snap=>{
      if(!snap.exists()) return;
      document.getElementById('msgs').innerHTML='';
      addMsg('','ARPEGGIOに接続しました。',false,true);
      addMsg('','あなたのIDは '+myName+' です。',false,true);
      snap.forEach(c=>{ const d=c.val(); addMsg(d.name,d.text,d.name===myName,false); });
    });

    // スマホ：キーボード展開時に最新メッセージへスクロール
    document.getElementById('chatInput').addEventListener('focus',()=>{
      setTimeout(()=>{ document.getElementById('msgs').scrollTop=document.getElementById('msgs').scrollHeight; },300);
    });
  }

  document.getElementById('enterBtn').addEventListener('click', enter);
  pwInput.addEventListener('keydown', e=>{ if(e.key==='Enter') document.getElementById('nickInput').focus(); });
  document.getElementById('nickInput').addEventListener('keydown', e=>{ if(e.key==='Enter') enter(); });

  function send() {
    const input = document.getElementById('chatInput');
    const text = input.value.trim();
    if(!text) return;
    push(ref(db,'messages'),{name:myName,text,ts:serverTimestamp()});
    input.value='';
  }
  document.getElementById('sendBtn').addEventListener('click',send);
  document.getElementById('chatInput').addEventListener('keydown',e=>{ if(e.key==='Enter') send(); });
</script>
</body>
</html>
