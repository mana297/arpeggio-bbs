<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content"/>
  <title>ARPEGGIO</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;overflow:hidden}
    body{background:#050905;display:flex;align-items:center;justify-content:center;font-family:'Share Tech Mono',monospace;color:#a8c8a8}
    .app{width:100%;max-width:980px;height:100dvh;background:#080c08;display:flex;flex-direction:column;overflow:hidden}
    .scanline{position:fixed;top:0;left:0;right:0;bottom:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.04) 2px,rgba(0,0,0,0.04) 4px);pointer-events:none;z-index:200}
    .hdr{background:#060b06;border-bottom:1px solid #1a2e1a;padding:10px 18px;display:flex;align-items:center;gap:12px;flex-shrink:0}
    .hdr-logo{font-family:'VT323',monospace;font-size:26px;color:#6dbd6d;letter-spacing:5px}
    .hdr-sub{font-size:9px;color:#2a4a2a;letter-spacing:2px}
    .hdr-right{margin-left:auto;display:flex;align-items:center;gap:10px}
    .dot{width:7px;height:7px;border-radius:50%;background:#4a9a4a;box-shadow:0 0 7px #4a9a4a;animation:blink 2s infinite;display:none}
    .me-badge{font-size:10px;color:#4a7a4a;letter-spacing:1px;display:none}
    .members-toggle{background:transparent;border:1px solid #2a4a2a;color:#4a7a4a;font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:1px;padding:4px 8px;cursor:pointer;display:none;transition:all .2s}
    .members-toggle:hover{color:#6dbd6d}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
    .screen{display:none;flex:1;min-height:0}
    .screen.on{display:flex}

    /* PASSWORD */
    #pw{flex-direction:column;align-items:center;justify-content:center;gap:22px;padding:40px 20px;overflow-y:auto}
    .pw-logo{font-family:'VT323',monospace;font-size:62px;color:#5aaa5a;letter-spacing:10px;text-shadow:0 0 28px rgba(90,170,90,.22)}
    .pw-desc{font-size:11px;color:#2a4a2a;letter-spacing:2px;text-align:center;line-height:2}
    .pw-form{display:flex;flex-direction:column;gap:11px;width:100%;max-width:340px}
    .lbl{font-size:10px;color:#2a4a2a;letter-spacing:3px}
    .lbl small{color:#1a3a1a;font-size:9px}
    .iw{position:relative;display:flex;align-items:center}
    .iw input{flex:1;padding-right:44px}
    .eye{position:absolute;right:0;width:40px;height:100%;background:transparent;border:none;color:#2a5a2a;cursor:pointer;font-family:'Share Tech Mono',monospace;font-size:10px;display:flex;align-items:center;justify-content:center;transition:color .2s}
    .eye:hover{color:#6dbd6d}
    input[type=password],input[type=text],textarea{font-family:'Share Tech Mono',monospace;outline:none;transition:border-color .2s}
    .pw-form input[type=password],.pw-form input[type=text]{width:100%;background:#0a120a;border:1px solid #1a3a1a;color:#7dbd7d;font-size:14px;padding:9px 13px}
    .pw-form input[type=password]{letter-spacing:5px}
    .pw-form input.nick{letter-spacing:1px}
    .pw-form input:focus{border-color:#3a7a3a}
    .saved-hint{font-size:10px;color:#3a6a3a;letter-spacing:1px}
    .sep{border:none;border-top:1px solid #152515;margin:2px 0}
    .err{font-size:11px;color:#7a3030;letter-spacing:2px;min-height:15px;text-align:center}
    .btn-enter{width:100%;background:transparent;border:1px solid #2a5a2a;color:#6dbd6d;font-family:'Share Tech Mono',monospace;font-size:13px;letter-spacing:4px;padding:10px;cursor:pointer;transition:all .2s}
    .btn-enter:hover{background:#0d1a0d;border-color:#4a8a4a}

    /* MAIN */
    #main{flex-direction:row}
    .main-left{display:flex;flex-direction:column;flex:1;min-width:0;min-height:0}
    .members-panel{width:180px;flex-shrink:0;border-left:1px solid #1a2e1a;background:#060b06;display:flex;flex-direction:column}
    .members-hdr{padding:10px 12px;border-bottom:1px solid #1a2e1a;font-size:10px;color:#2a4a2a;letter-spacing:3px;display:flex;align-items:center;gap:6px;flex-shrink:0}
    .online-badge{background:#0d1a0d;border:1px solid #1a3a1a;color:#4a9a4a;font-size:10px;padding:1px 7px;margin-left:auto}
    .members-list{flex:1;overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:4px;scrollbar-width:thin;scrollbar-color:#1a3a1a #060b06}
    .member-row{display:flex;align-items:center;gap:8px;padding:5px 6px;border:1px solid transparent;transition:all .15s;animation:pop .2s ease}
    .member-row:hover{border-color:#1a3a1a;background:#0a120a}
    .member-av{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:bold;flex-shrink:0;border:1px solid transparent}
    .member-name{font-size:11px;color:#3e6a3e;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
    .member-name.is-me{color:#6dbd6d}
    .member-dot{width:5px;height:5px;border-radius:50%;background:#3a8a3a;flex-shrink:0}
    .mute-btn{background:transparent;border:1px solid #3a1a1a;color:#6a3a3a;font-family:'Share Tech Mono',monospace;font-size:9px;padding:2px 5px;cursor:pointer;transition:all .15s;flex-shrink:0}
    .mute-btn:hover{background:#1a0808;color:#cc6666}
    .mute-btn.active{color:#cc6666;border-color:#5a1a1a}

    /* TABS */
    .tabs{display:flex;border-bottom:1px solid #1a2e1a;background:#060b06;flex-shrink:0}
    .tab{flex:1;padding:8px;font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:3px;color:#2a4a2a;background:transparent;border:none;cursor:pointer;transition:all .2s;border-bottom:2px solid transparent}
    .tab.active{color:#6dbd6d;border-bottom-color:#4a8a4a}
    .tab:hover:not(.active){color:#4a7a4a}
    .pane{display:none;flex:1;flex-direction:column;min-height:0}
    .pane.on{display:flex}

    /* CHAT */
    .chat-msgs{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:4px;scrollbar-width:thin;scrollbar-color:#1a3a1a #080c08;-webkit-overflow-scrolling:touch;min-height:0}
    .msg{display:flex;gap:9px;align-items:flex-start;animation:pop .16s ease;position:relative}
    @keyframes pop{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:none}}
    .avatar{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:bold;flex-shrink:0;margin-top:1px;border:1px solid transparent}
    .msg-meta{display:flex;flex-direction:column;gap:2px;flex:1;min-width:0}
    .msg-top{display:flex;align-items:baseline;gap:8px}
    .msg-name{font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:140px}
    .msg-name.me{color:#6dbd6d}
    .msg-name.other{color:#3e6a3e}
    .msg-name.sys{color:#2a4a5a}
    .msg-time{font-size:10px;color:#1e3e1e;flex-shrink:0}
    .msg-body{font-size:13px;color:#7aaa7a;line-height:1.5;word-break:break-word}
    .msg-body.sys{color:#2a4a5a;font-size:11px;font-style:italic}
    .msg-body.cmd{color:#5a8a5a;font-size:12px;font-style:italic}
    .del-msg-btn{position:absolute;right:2px;top:2px;background:#1a0808;border:1px solid #3a1a1a;color:#8a4a4a;font-family:'Share Tech Mono',monospace;font-size:10px;padding:1px 6px;cursor:pointer;display:none;transition:all .15s}
    .del-msg-btn:hover{color:#cc6666}
    .msg:hover .del-msg-btn{display:block}
    .msg.muted{opacity:0.25}
    .date-sep{display:flex;align-items:center;gap:10px;padding:6px 0;margin:4px 0}
    .date-sep-line{flex:1;border-top:1px solid #1a2a1a}
    .date-sep-text{font-size:10px;color:#1e3e2e;letter-spacing:2px;white-space:nowrap}
    .notice{font-size:11px;color:#1e4a2e;letter-spacing:1px;padding:2px 0 2px 36px;font-style:italic;animation:pop .2s ease}
    .spam-warn{font-size:11px;color:#5a3a1a;letter-spacing:1px;padding:2px 0 2px 36px;font-style:italic;animation:pop .2s ease}
    .chat-bar{border-top:1px solid #1a2e1a;padding:9px 14px;display:flex;gap:8px;background:#060b06;flex-shrink:0}
    .ci{flex:1;background:#0a120a;border:1px solid #1a3a1a;color:#8ab88a;font-size:13px;padding:8px 11px;min-width:0}
    .ci:focus{border-color:#3a6a3a}
    .btn-send{background:transparent;border:1px solid #2a5a2a;color:#6dbd6d;font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:2px;padding:8px 14px;cursor:pointer;flex-shrink:0;transition:all .15s}
    .btn-send:hover{background:#0d1a0d}

    /* ── BOARD（Twitter風）── */
    #bbs{display:none;flex:1;flex-direction:column;min-height:0}
    #bbs.on{display:flex}

    /* 投稿フォーム（上部固定） */
    .post-compose{border-bottom:1px solid #1a2e1a;padding:10px 14px;background:#060b06;flex-shrink:0;display:flex;gap:10px;align-items:flex-start}
    .compose-av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:bold;flex-shrink:0;border:1px solid transparent;margin-top:2px}
    .compose-right{flex:1;display:flex;flex-direction:column;gap:6px;min-width:0}
    .compose-input{width:100%;background:#0a120a;border:1px solid #1a3a1a;color:#8ab88a;font-size:13px;padding:8px 11px;resize:none;height:60px;line-height:1.5}
    .compose-input:focus{border-color:#3a6a3a}
    .compose-footer{display:flex;justify-content:flex-end}
    .btn-post{background:transparent;border:1px solid #2a5a2a;color:#6dbd6d;font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:2px;padding:6px 16px;cursor:pointer;transition:all .15s}
    .btn-post:hover{background:#0d1a0d}

    /* 投稿フィード */
    .bbs-feed{flex:1;overflow-y:auto;padding:0;display:flex;flex-direction:column;scrollbar-width:thin;scrollbar-color:#1a3a1a #080c08;min-height:0}

    /* 投稿カード */
    .post-card{border-bottom:1px solid #111e11;padding:12px 14px;animation:pop .2s ease;position:relative;transition:background .15s}
    .post-card:hover{background:#0a0e0a}
    .post-inner{display:flex;gap:10px}
    .post-av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:bold;flex-shrink:0;border:1px solid transparent}
    .post-right{flex:1;min-width:0}
    .post-header{display:flex;align-items:baseline;gap:8px;margin-bottom:4px}
    .post-author{font-size:12px;color:#3e6a3e}
    .post-author.me{color:#6dbd6d}
    .post-time{font-size:10px;color:#1e3e1e}
    .post-text{font-size:13px;color:#7aaa7a;line-height:1.6;word-break:break-word;margin-bottom:8px}

    /* アクションバー */
    .post-actions{display:flex;gap:16px;align-items:center}
    .action-btn{background:transparent;border:none;font-family:'Share Tech Mono',monospace;font-size:11px;cursor:pointer;display:flex;align-items:center;gap:5px;padding:3px 6px;transition:all .15s;color:#2a5a2a;letter-spacing:1px}
    .action-btn:hover{color:#5a9a5a}
    .action-btn.liked{color:#9a5a7a}
    .action-btn.liked:hover{color:#cc7a9a}
    .action-count{font-size:11px}

    /* 管理者削除ボタン */
    .del-post-btn{position:absolute;right:8px;top:8px;background:#1a0808;border:1px solid #3a1a1a;color:#8a4a4a;font-family:'Share Tech Mono',monospace;font-size:10px;padding:2px 7px;cursor:pointer;display:none;transition:all .15s}
    .del-post-btn:hover{color:#cc6666}
    .post-card:hover .del-post-btn{display:block}

    /* リプライエリア */
    .reply-area{display:none;margin-top:8px;padding-top:8px;border-top:1px solid #0f1e0f}
    .reply-area.open{display:block}
    .reply-list{display:flex;flex-direction:column;gap:6px;margin-bottom:8px}
    .reply-item{display:flex;gap:8px;align-items:flex-start;padding:6px 8px;background:#0a120a;border-left:2px solid #1a3a1a}
    .reply-av{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:bold;flex-shrink:0;border:1px solid transparent}
    .reply-meta{flex:1;min-width:0}
    .reply-header{display:flex;gap:6px;align-items:baseline;margin-bottom:2px}
    .reply-author{font-size:10px;color:#3e6a3e}
    .reply-author.me{color:#6dbd6d}
    .reply-time{font-size:9px;color:#1e3e1e}
    .reply-text{font-size:12px;color:#6a9a6a;line-height:1.5;word-break:break-word}
    .reply-input-row{display:flex;gap:8px}
    .reply-input{flex:1;background:#080e08;border:1px solid #1a2e1a;color:#7aaa7a;font-family:'Share Tech Mono',monospace;font-size:12px;padding:6px 10px;min-width:0}
    .reply-input:focus{border-color:#2a5a2a}
    .btn-reply-send{background:transparent;border:1px solid #1e4e1e;color:#4a8a4a;font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:1px;padding:6px 10px;cursor:pointer;flex-shrink:0;transition:all .15s}
    .btn-reply-send:hover{background:#0a180a;color:#6dbd6d}

    .no-posts{color:#1e3e1e;font-size:11px;letter-spacing:2px;padding:30px;text-align:center}

    /* アバターカラー */
    .av0{background:#0d1a16;border-color:#1a4a3a;color:#4a9a7a}
    .av1{background:#0d130d;border-color:#1a4a1a;color:#4a9a4a}
    .av2{background:#0d1520;border-color:#1a3a5a;color:#4a7aaa}
    .av3{background:#1a100d;border-color:#4a2a1a;color:#9a6a4a}
    .av4{background:#150d1a;border-color:#3a1a4a;color:#7a4a9a}
    .av5{background:#1a0d10;border-color:#4a1a2a;color:#9a4a5a}
    .sys-av{background:#0d1215;border-color:#1a2a35;color:#3a6a7a}

    /* 管理者パネル */
    .admin-fab{display:none;position:fixed;bottom:16px;right:16px;background:#120808;border:1px solid #4a1a1a;color:#8a4a4a;font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:2px;padding:8px 14px;cursor:pointer;z-index:301;transition:all .2s}
    .admin-fab:hover,.admin-fab.on{background:#1a0808;color:#cc6666;border-color:#6a2a2a}
    .admin-panel{display:none;position:fixed;bottom:56px;right:16px;width:240px;background:#0a0d0a;border:1px solid #3a1a1a;z-index:300;flex-direction:column;box-shadow:0 0 20px rgba(180,60,60,0.12)}
    .admin-panel.on{display:flex}
    .admin-phdr{background:#120808;border-bottom:1px solid #3a1a1a;padding:8px 12px;display:flex;align-items:center;justify-content:space-between}
    .admin-ptitle{font-size:11px;color:#cc6666;letter-spacing:3px}
    .admin-pclose{background:transparent;border:none;color:#6a3a3a;cursor:pointer;font-family:'Share Tech Mono',monospace;font-size:12px}
    .admin-pclose:hover{color:#cc6666}
    .admin-pbody{padding:12px;display:flex;flex-direction:column;gap:8px}
    .admin-stats{display:grid;grid-template-columns:1fr 1fr;gap:6px}
    .admin-stat{background:#0d0808;border:1px solid #2a1a1a;padding:6px 8px}
    .admin-stat-label{font-size:9px;color:#4a2a2a;letter-spacing:2px;margin-bottom:2px}
    .admin-stat-val{font-size:16px;color:#9a5a5a;font-family:'VT323',monospace;letter-spacing:2px}
    .admin-divider{border:none;border-top:1px solid #1a0a0a;margin:2px 0}
    .admin-btn{width:100%;background:transparent;border:1px solid #2a1a1a;color:#7a4a4a;font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:2px;padding:7px 10px;cursor:pointer;transition:all .2s;text-align:left}
    .admin-btn:hover{background:#1a0808;color:#cc6666;border-color:#4a1a1a}
    .admin-hint{font-size:9px;color:#2a1a1a;letter-spacing:1px;line-height:1.6}

    @media(max-width:600px){
      .members-panel{position:fixed;top:0;right:0;bottom:0;z-index:150;width:160px;transform:translateX(100%);transition:transform .25s;display:flex}
      .members-panel.open{transform:translateX(0)}
      .members-toggle{display:block}
      .pw-logo{font-size:48px;letter-spacing:6px}
      .admin-panel{bottom:56px;right:8px;width:200px}
      .admin-fab{bottom:12px;right:8px}
    }
  </style>
</head>
<body>
<div class="scanline"></div>
<div class="app">
  <div class="hdr">
    <div><div class="hdr-logo">ARPEGGIO</div><div class="hdr-sub" id="hdrSub">ANONYMOUS COMMUNITY</div></div>
    <div class="hdr-right">
      <span class="me-badge" id="meBadge"></span>
      <button class="members-toggle" id="membersToggle">MEMBERS</button>
      <div class="dot" id="dot"></div>
    </div>
  </div>

  <div class="screen on" id="pw">
    <div class="pw-logo">ARPEGGIO</div>
    <div class="pw-desc">THIS SITE IS OPEN TO ANYONE<br>WHO KNOWS THE PASSWORD</div>
    <div class="pw-form">
      <div class="lbl">&gt; PASSWORD</div>
      <div class="iw">
        <input type="password" id="pwIn" placeholder="enter password..." autocomplete="off"/>
        <button class="eye" id="eyeBtn" tabindex="-1">SHOW</button>
      </div>
      <hr class="sep"/>
      <div class="lbl">&gt; NICKNAME <small>( OPTIONAL )</small></div>
      <input type="text" class="nick" id="nickIn" placeholder="未設定の場合は自動割り当て" maxlength="20" autocomplete="off"/>
      <div class="saved-hint" id="savedHint"></div>
      <div class="err" id="errMsg"></div>
      <button class="btn-enter" id="enterBtn">[ ENTER ]</button>
    </div>
  </div>

  <div class="screen" id="main">
    <div class="main-left">
      <div class="tabs">
        <button class="tab active" data-pane="chat">CHAT</button>
        <button class="tab" data-pane="bbs">BOARD</button>
      </div>

      <!-- CHAT -->
      <div class="pane on" id="chat">
        <div class="chat-msgs" id="chatMsgs"></div>
        <div class="chat-bar">
          <input class="ci" type="text" id="chatIn" placeholder="メッセージを入力... ( / でコマンド)" maxlength="200" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"/>
          <button class="btn-send" id="sendBtn">SEND</button>
        </div>
      </div>

      <!-- BOARD -->
      <div class="pane" id="bbs">
        <!-- 投稿フォーム -->
        <div class="post-compose">
          <div class="compose-av" id="composeAv"></div>
          <div class="compose-right">
            <textarea class="compose-input" id="composeInput" placeholder="今何してる？" maxlength="280"></textarea>
            <div class="compose-footer">
              <button class="btn-post" id="postBtn">POST</button>
            </div>
          </div>
        </div>
        <!-- フィード -->
        <div class="bbs-feed" id="bbsFeed"></div>
      </div>
    </div>

    <div class="members-panel" id="membersPanel">
      <div class="members-hdr">MEMBERS<span class="online-badge" id="onlineBadge">0</span></div>
      <div class="members-list" id="membersList"></div>
    </div>
  </div>
</div>

<button class="admin-fab" id="adminFab">// OBSERVER</button>
<div class="admin-panel" id="adminPanel">
  <div class="admin-phdr">
    <span class="admin-ptitle">OBSERVER MODE</span>
    <button class="admin-pclose" id="adminClose">[×]</button>
  </div>
  <div class="admin-pbody">
    <div class="admin-stats">
      <div class="admin-stat"><div class="admin-stat-label">ONLINE</div><div class="admin-stat-val" id="sOnline">0</div></div>
      <div class="admin-stat"><div class="admin-stat-label">MESSAGES</div><div class="admin-stat-val" id="sMsgs">0</div></div>
      <div class="admin-stat"><div class="admin-stat-label">POSTS</div><div class="admin-stat-val" id="sPosts">0</div></div>
      <div class="admin-stat"><div class="admin-stat-label">MUTED</div><div class="admin-stat-val" id="sMuted">0</div></div>
    </div>
    <hr class="admin-divider"/>
    <button class="admin-btn" id="adminScrollLatest">↓ 最新チャットへ</button>
    <button class="admin-btn" id="adminClearMutes">MUTE をすべて解除</button>
    <hr class="admin-divider"/>
    <div class="admin-hint">メッセージ・投稿にカーソルを当てると DEL が表示されます。</div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, onValue, serverTimestamp, onDisconnect, set, remove, runTransaction }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
import { getAuth, signInAnonymously }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const cfg={apiKey:"AIzaSyCZKSGamG9fW93bYbRcoIPYEFIx7wrDLsE",authDomain:"arpeggio-bbs.firebaseapp.com",databaseURL:"https://arpeggio-bbs-default-rtdb.firebaseio.com",projectId:"arpeggio-bbs",storageBucket:"arpeggio-bbs.firebasestorage.app",messagingSenderId:"155564356931",appId:"1:155564356931:web:b2b82d9ff90d19a6a22bf6"};
const db=getDatabase(initializeApp(cfg));
const auth=getAuth();
const USER_PW='arpeggio',ADMIN_PW='izaya',SPAM_MS=3000;
const adj=['Silent','Shadow','Phantom','Hollow','Neon','Crimson','Azure','Void','Static','Binary'];
const noun=['Walker','Ghost','Drifter','Signal','Echo','Cipher','Specter','Node','Relay','Pulse'];
function randId(){return adj[Math.floor(Math.random()*adj.length)]+noun[Math.floor(Math.random()*noun.length)]+'_'+(Math.floor(Math.random()*900)+100);}
function avClass(n){if(!n)return'sys-av';let h=0;for(let c of n)h=(h*31+c.charCodeAt(0))&0xffff;return'av'+(h%6);}
function avText(n){return n?n.slice(0,2).toUpperCase():'SY';}
function fmt(ts){const d=ts?new Date(ts):new Date();return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');}
function dateLabel(ts){const d=ts?new Date(ts):new Date();return d.getFullYear()+'/'+(d.getMonth()+1).toString().padStart(2,'0')+'/'+d.getDate().toString().padStart(2,'0');}
function normalizeSlash(s){return s.replace(/／/g,'/').trim();}
function isCommand(s){return normalizeSlash(s).startsWith('/');}

let myName='',isAdmin=false,mutedUsers=new Set(),lastSent=0,totalMsgs=0,totalPosts=0;
let presenceKey=sessionStorage.getItem('arpeggio_pkey');
if(!presenceKey){presenceKey='p_'+Math.random().toString(36).slice(2);sessionStorage.setItem('arpeggio_pkey',presenceKey);}
const SAVED_KEY='arpeggio_nickname';
const sn=localStorage.getItem(SAVED_KEY);
if(sn){document.getElementById('nickIn').value=sn;document.getElementById('savedHint').textContent='// 前回の名前: '+sn;}

function mkAv(n,cls='avatar'){const el=document.createElement('div');el.className=cls+' '+avClass(n);el.textContent=avText(n);return el;}
function updateAdminStats(){
  document.getElementById('sOnline').textContent=document.getElementById('onlineBadge').textContent;
  document.getElementById('sMsgs').textContent=totalMsgs;
  document.getElementById('sPosts').textContent=totalPosts;
  document.getElementById('sMuted').textContent=mutedUsers.size;
}

// ── CHAT ──
let lastDL='';
function addChat(name,text,isMe,isSys,ts,key,isCmd){
  const msgs=document.getElementById('chatMsgs');
  if(!isSys&&!isCmd&&ts){
    const dl=dateLabel(ts);
    if(dl!==lastDL){lastDL=dl;const sep=document.createElement('div');sep.className='date-sep';const l1=document.createElement('div');l1.className='date-sep-line';const l2=document.createElement('div');l2.className='date-sep-line';const tx=document.createElement('div');tx.className='date-sep-text';tx.textContent=dl;sep.appendChild(l1);sep.appendChild(tx);sep.appendChild(l2);msgs.appendChild(sep);}
  }
  const row=document.createElement('div');row.className='msg'+(mutedUsers.has(name)?' muted':'');
  if(key)row.dataset.key=key;
  const av=document.createElement('div');av.className='avatar '+(isSys?'sys-av':avClass(name));av.textContent=isSys?'SY':avText(name);
  const meta=document.createElement('div');meta.className='msg-meta';
  const top=document.createElement('div');top.className='msg-top';
  const nm=document.createElement('div');nm.className='msg-name '+(isSys?'sys':isMe?'me':'other');nm.textContent=isSys?'SYSTEM':name;
  const tm=document.createElement('div');tm.className='msg-time';tm.textContent=fmt(ts);
  top.appendChild(nm);top.appendChild(tm);
  const bd=document.createElement('div');bd.className='msg-body'+(isSys?' sys':isCmd?' cmd':'');bd.textContent=text;
  meta.appendChild(top);meta.appendChild(bd);row.appendChild(av);row.appendChild(meta);
  if(isAdmin&&key&&!isSys){const btn=document.createElement('button');btn.className='del-msg-btn';btn.textContent='DEL';btn.onclick=()=>{if(confirm('削除しますか？'))remove(ref(db,'messages/'+key));};row.appendChild(btn);}
  msgs.appendChild(row);msgs.scrollTop=msgs.scrollHeight;
}
function addNotice(t){const msgs=document.getElementById('chatMsgs');const el=document.createElement('div');el.className='notice';el.textContent=t;msgs.appendChild(el);msgs.scrollTop=msgs.scrollHeight;}
function addSpamWarn(){const msgs=document.getElementById('chatMsgs');const el=document.createElement('div');el.className='spam-warn';el.textContent='// 送信が早すぎます。';msgs.appendChild(el);msgs.scrollTop=msgs.scrollHeight;setTimeout(()=>el.remove(),2500);}

// ── コマンド ──
function handleCmd(raw){
  const text=normalizeSlash(raw),parts=text.trim().split(/\s+/),cmd=parts[0].toLowerCase(),args=parts.slice(1).join(' ');
  const say=(t)=>addChat('',t,false,false,null,null,true);
  if(cmd==='/help')say('[ HELP ] /members /me /clear /coin /8ball [質問]');
  else if(cmd==='/members')say('[ SYSTEM ] 現在 '+document.getElementById('onlineBadge').textContent+' 人が接続中です。');
  else if(cmd==='/me')say('[ SYSTEM ] あなたのIDは '+myName+' です。');
  else if(cmd==='/clear'){document.getElementById('chatMsgs').innerHTML='';lastDL='';say('[ SYSTEM ] 画面をクリアしました。');}
  else if(cmd==='/coin'){const r=Math.random()<.5?'表 (HEADS)':'裏 (TAILS)';say('[ COIN ] '+r);push(ref(db,'messages'),{name:myName,text:'🪙 コインを投げた → '+r,ts:serverTimestamp()});}
  else if(cmd==='/8ball'){const a=['そうでしょう。','確かにそうです。','可能性は高い。','おそらくそう。','わからない。','もう一度。','疑わしい。','おそらく違う。','確実に違う。'][Math.floor(Math.random()*9)];say('[ 8BALL ] 「'+args+'」→ '+a);push(ref(db,'messages'),{name:myName,text:'🎱 「'+args+'」→ '+a,ts:serverTimestamp()});}
  else say('[ ERROR ] 不明なコマンド。/help で一覧を確認。');
}

// ── BOARD ──
// いいね状態をローカルで管理（自分がいいねしたpostIDのセット）
const likedPosts=new Set(JSON.parse(localStorage.getItem('arpeggio_likes')||'[]'));
function saveLikes(){localStorage.setItem('arpeggio_likes',JSON.stringify([...likedPosts]));}

function buildPostCard(postId,data,likesData,repliesData){
  const isMe=data.author===myName;
  const card=document.createElement('div');card.className='post-card';card.dataset.pid=postId;

  const inner=document.createElement('div');inner.className='post-inner';
  const av=mkAv(data.author,'post-av');
  const right=document.createElement('div');right.className='post-right';

  const hdr=document.createElement('div');hdr.className='post-header';
  const author=document.createElement('span');author.className='post-author'+(isMe?' me':'');author.textContent=data.author;
  const time=document.createElement('span');time.className='post-time';time.textContent=data.dateStr||'';
  hdr.appendChild(author);hdr.appendChild(time);

  const text=document.createElement('div');text.className='post-text';text.textContent=data.text||'';

  // アクションバー
  const actions=document.createElement('div');actions.className='post-actions';

  // いいねボタン
  const likeCount=likesData?Object.keys(likesData).length:0;
  const isLiked=likedPosts.has(postId);
  const likeBtn=document.createElement('button');
  likeBtn.className='action-btn'+(isLiked?' liked':'');
  likeBtn.innerHTML='<span>'+(isLiked?'♥':'♡')+'</span><span class="action-count">'+likeCount+'</span>';
  likeBtn.onclick=(e)=>{
    e.stopPropagation();
    const likeRef=ref(db,'postLikes/'+postId+'/'+presenceKey);
    if(likedPosts.has(postId)){
      likedPosts.delete(postId);saveLikes();
      remove(likeRef);
    } else {
      likedPosts.add(postId);saveLikes();
      set(likeRef,true);
    }
  };

  // リプライボタン
  const replyCount=repliesData?Object.keys(repliesData).length:0;
  const replyBtn=document.createElement('button');
  replyBtn.className='action-btn';
  replyBtn.innerHTML='<span>↩</span><span class="action-count">'+replyCount+'</span>';
  replyBtn.onclick=(e)=>{e.stopPropagation();const ra=card.querySelector('.reply-area');ra.classList.toggle('open');if(ra.classList.contains('open'))card.querySelector('.reply-input').focus();};

  actions.appendChild(likeBtn);
  actions.appendChild(replyBtn);

  // リプライエリア
  const replyArea=document.createElement('div');replyArea.className='reply-area';
  const replyList=document.createElement('div');replyList.className='reply-list';

  if(repliesData){
    Object.entries(repliesData).sort((a,b)=>(a[1].ts||0)-(b[1].ts||0)).forEach(([rid,r])=>{
      const ri=document.createElement('div');ri.className='reply-item';
      const rav=mkAv(r.author,'reply-av');
      const rmeta=document.createElement('div');rmeta.className='reply-meta';
      const rhdr=document.createElement('div');rhdr.className='reply-header';
      const ra2=document.createElement('span');ra2.className='reply-author'+(r.author===myName?' me':'');ra2.textContent=r.author;
      const rt=document.createElement('span');rt.className='reply-time';rt.textContent=fmt(r.ts);
      rhdr.appendChild(ra2);rhdr.appendChild(rt);
      const rtx=document.createElement('div');rtx.className='reply-text';rtx.textContent=r.text;
      rmeta.appendChild(rhdr);rmeta.appendChild(rtx);
      ri.appendChild(rav);ri.appendChild(rmeta);
      replyList.appendChild(ri);
    });
  }

  const replyInputRow=document.createElement('div');replyInputRow.className='reply-input-row';
  const replyInput=document.createElement('input');replyInput.className='reply-input';replyInput.type='text';replyInput.placeholder='リプライを入力...';replyInput.maxLength=200;replyInput.autocomplete='off';
  const replySendBtn=document.createElement('button');replySendBtn.className='btn-reply-send';replySendBtn.textContent='SEND';
  const doReply=()=>{
    const t=replyInput.value.trim();if(!t)return;
    push(ref(db,'postReplies/'+postId),{author:myName,text:t,ts:serverTimestamp()});
    replyInput.value='';
  };
  replySendBtn.onclick=doReply;
  replyInput.addEventListener('keydown',e=>{if(e.key==='Enter')doReply();});
  replyInputRow.appendChild(replyInput);replyInputRow.appendChild(replySendBtn);
  replyArea.appendChild(replyList);replyArea.appendChild(replyInputRow);

  right.appendChild(hdr);right.appendChild(text);right.appendChild(actions);right.appendChild(replyArea);
  inner.appendChild(av);inner.appendChild(right);
  card.appendChild(inner);

  // 管理者削除
  if(isAdmin){const btn=document.createElement('button');btn.className='del-post-btn';btn.textContent='DEL';btn.onclick=(e)=>{e.stopPropagation();if(confirm('削除しますか？')){remove(ref(db,'posts2/'+postId));remove(ref(db,'postLikes/'+postId));remove(ref(db,'postReplies/'+postId));}};card.appendChild(btn);}

  return card;
}

// ── Board全件再描画（postLikes/postRepliesも込み）──
let allPosts={},allLikes={},allReplies={};

function redrawBoard(){
  const feed=document.getElementById('bbsFeed');
  feed.innerHTML='';
  const ids=Object.keys(allPosts);
  if(ids.length===0){const e=document.createElement('div');e.className='no-posts';e.textContent='// NO POSTS YET';feed.appendChild(e);totalPosts=0;updateAdminStats();return;}
  // 新しい順
  ids.sort((a,b)=>(allPosts[b].ts||0)-(allPosts[a].ts||0));
  totalPosts=ids.length;updateAdminStats();
  ids.forEach(id=>{
    const card=buildPostCard(id,allPosts[id],allLikes[id]||null,allReplies[id]||null);
    feed.appendChild(card);
  });
}

// ── メンバーリスト ──
let prevMembers={};
function updateMembers(snap){
  const list=document.getElementById('membersList');list.innerHTML='';
  const members=snap.exists()?snap.val():{};
  const keys=Object.keys(members);
  document.getElementById('onlineBadge').textContent=keys.length;
  document.getElementById('hdrSub').textContent='ANONYMOUS COMMUNITY  |  ONLINE: '+keys.length;
  if(myName){
    keys.forEach(k=>{const n=members[k].name;if(n&&n!==myName&&!Object.values(prevMembers).find(m=>m.name===n))addNotice('// '+n+' が入室しました');});
    Object.values(prevMembers).forEach(m=>{if(m.name&&m.name!==myName&&!keys.find(k=>members[k].name===m.name))addNotice('// '+m.name+' が退出しました');});
  }
  prevMembers=members;
  keys.sort((a,b)=>{if(members[a].name===myName)return-1;if(members[b].name===myName)return 1;return 0;});
  keys.forEach(k=>{
    const name=members[k].name||'?',isMe=name===myName;
    const row=document.createElement('div');row.className='member-row';
    const av=document.createElement('div');av.className='member-av '+avClass(name);av.textContent=avText(name);
    const nm=document.createElement('div');nm.className='member-name'+(isMe?' is-me':'');nm.textContent=isMe?name+' ★':name;
    const dot=document.createElement('div');dot.className='member-dot';
    row.appendChild(av);row.appendChild(nm);row.appendChild(dot);
    if(isAdmin&&!isMe){const btn=document.createElement('button');const muted=mutedUsers.has(name);btn.className='mute-btn'+(muted?' active':'');btn.textContent=muted?'UNMUTE':'MUTE';btn.onclick=()=>{if(mutedUsers.has(name)){mutedUsers.delete(name);}else{mutedUsers.add(name);}document.querySelectorAll('.msg').forEach(m=>{const n=m.querySelector('.msg-name');if(n&&n.textContent===name)m.classList.toggle('muted',mutedUsers.has(name));});updateAdminStats();updateMembers(snap);};row.appendChild(btn);}
    list.appendChild(row);
  });
  updateAdminStats();
}

// タブ
document.querySelectorAll('.tab').forEach(t=>{t.addEventListener('click',()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));document.querySelectorAll('.pane').forEach(x=>x.classList.remove('on'));t.classList.add('active');document.getElementById(t.dataset.pane).classList.add('on');});});
const mToggle=document.getElementById('membersToggle'),mPanel=document.getElementById('membersPanel');
mToggle.addEventListener('click',e=>{e.stopPropagation();mPanel.classList.toggle('open');});
document.addEventListener('click',e=>{if(!mPanel.contains(e.target)&&e.target!==mToggle)mPanel.classList.remove('open');});
const pwIn=document.getElementById('pwIn');
document.getElementById('eyeBtn').addEventListener('click',()=>{const h=pwIn.type==='password';pwIn.type=h?'text':'password';document.getElementById('eyeBtn').textContent=h?'HIDE':'SHOW';});
const adminFab=document.getElementById('adminFab'),adminPanel=document.getElementById('adminPanel');
adminFab.addEventListener('click',()=>{adminPanel.classList.toggle('on');adminFab.classList.toggle('on');updateAdminStats();});
document.getElementById('adminClose').addEventListener('click',()=>{adminPanel.classList.remove('on');adminFab.classList.remove('on');});
document.getElementById('adminScrollLatest').addEventListener('click',()=>{document.getElementById('chatMsgs').scrollTop=document.getElementById('chatMsgs').scrollHeight;});
document.getElementById('adminClearMutes').addEventListener('click',()=>{mutedUsers.clear();document.querySelectorAll('.msg.muted').forEach(m=>m.classList.remove('muted'));updateAdminStats();addChat('','[ OBSERVER ] すべてのMUTEを解除しました。',false,false,null,null,true);});

// ── 入室 ──
function enter(){
  const pw=pwIn.value.trim().toLowerCase(),nick=document.getElementById('nickIn').value.trim();
  if(pw===ADMIN_PW){isAdmin=true;}else if(pw===USER_PW){isAdmin=false;}else{document.getElementById('errMsg').textContent='// INVALID PASSWORD';pwIn.value='';return;}
  myName=nick||randId();
  localStorage.setItem(SAVED_KEY,myName);

  // Firebase匿名認証してからチャット開始
  document.getElementById('enterBtn').textContent='[ CONNECTING... ]';
  document.getElementById('enterBtn').disabled=true;

  signInAnonymously(auth).then(()=>{
    startChat();
  }).catch(err=>{
    document.getElementById('errMsg').textContent='// CONNECTION ERROR: '+err.code;
    document.getElementById('enterBtn').textContent='[ ENTER ]';
    document.getElementById('enterBtn').disabled=false;
  });
}

function startChat(){
  document.getElementById('pw').classList.remove('on');
  document.getElementById('main').classList.add('on');
  document.getElementById('dot').style.display='block';
  document.getElementById('meBadge').textContent=myName;
  document.getElementById('meBadge').style.display='block';
  if(isAdmin)adminFab.style.display='block';

  // 投稿フォームのアバターをセット
  const cav=document.getElementById('composeAv');
  cav.className='compose-av '+avClass(myName);cav.textContent=avText(myName);

  addChat('','ARPEGGIOに接続しました。',false,true,null,null,false);
  addChat('','あなたのIDは '+myName+' です。',false,true,null,null,false);
  addChat('','/ を入力するとコマンドが使えます。',false,true,null,null,false);
  if(isAdmin)addChat('','[ OBSERVER MODE ] 右下のボタンで管理パネルを開けます。',false,true,null,null,false);

  // presence（再接続対応）
  const prRef=ref(db,'presence/'+presenceKey);
  onValue(ref(db,'.info/connected'),snap=>{if(snap.val()===true){set(prRef,{name:myName});onDisconnect(prRef).remove();}});
  onValue(ref(db,'presence'),snap=>updateMembers(snap));

  // chat
  let rendered=new Set();
  onValue(ref(db,'messages'),snap=>{
    if(!snap.exists())return;
    totalMsgs=0;
    snap.forEach(c=>{totalMsgs++;if(rendered.has(c.key))return;rendered.add(c.key);const d=c.val();addChat(d.name,d.text,d.name===myName,false,d.ts,c.key,false);});
    document.querySelectorAll('.msg[data-key]').forEach(el=>{if(!snap.child(el.dataset.key).exists())el.remove();});
    updateAdminStats();
  });

  // board: posts2（新しいデータノード）
  onValue(ref(db,'posts2'),snap=>{
    allPosts={};
    if(snap.exists())snap.forEach(c=>{allPosts[c.key]=c.val();});
    redrawBoard();
  });
  // likes
  onValue(ref(db,'postLikes'),snap=>{
    allLikes={};
    if(snap.exists())snap.forEach(c=>{allLikes[c.key]=c.val();});
    redrawBoard();
  });
  // replies
  onValue(ref(db,'postReplies'),snap=>{
    allReplies={};
    if(snap.exists())snap.forEach(c=>{allReplies[c.key]=c.val();});
    redrawBoard();
  });

  document.getElementById('chatIn').addEventListener('focus',()=>{setTimeout(()=>{document.getElementById('chatMsgs').scrollTop=document.getElementById('chatMsgs').scrollHeight;},300);});
}
document.getElementById('enterBtn').addEventListener('click',enter);
pwIn.addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('nickIn').focus();});
document.getElementById('nickIn').addEventListener('keydown',e=>{if(e.key==='Enter')enter();});

// chat送信
function sendChat(){
  const el=document.getElementById('chatIn'),raw=el.value;const text=normalizeSlash(raw).trim();if(!text)return;el.value='';
  if(isCommand(raw)){handleCmd(text);return;}
  const now=Date.now();if(!isAdmin&&now-lastSent<SPAM_MS){addSpamWarn();return;}
  lastSent=now;push(ref(db,'messages'),{name:myName,text,ts:serverTimestamp()});
}
document.getElementById('sendBtn').addEventListener('click',sendChat);
document.getElementById('chatIn').addEventListener('keydown',e=>{if(e.key==='Enter')sendChat();});

// board投稿
function sendPost(){
  const el=document.getElementById('composeInput');
  const text=el.value.trim();if(!text)return;
  const now=new Date();
  const dateStr=String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0')+' · '+now.getFullYear()+'/'+(now.getMonth()+1).toString().padStart(2,'0')+'/'+now.getDate().toString().padStart(2,'0');
  push(ref(db,'posts2'),{author:myName,text,dateStr,ts:serverTimestamp()});
  el.value='';
}
document.getElementById('postBtn').addEventListener('click',sendPost);
document.getElementById('composeInput').addEventListener('keydown',e=>{if(e.key==='Enter'&&e.ctrlKey)sendPost();});
</script>
