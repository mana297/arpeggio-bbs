<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content"/>
  <title>ARPEGGIO</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;overflow:hidden}
    body{background:#050905;display:flex;align-items:center;justify-content:center;font-family:'Share Tech Mono',monospace;color:#a8c8a8}
    .app{width:100%;max-width:980px;height:100dvh;background:#080c08;display:flex;flex-direction:column;overflow:hidden}
    .scanline{position:fixed;top:0;left:0;right:0;bottom:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.04) 2px,rgba(0,0,0,0.04) 4px);pointer-events:none;z-index:200}

    .hdr{background:#060b06;border-bottom:1px solid #1a2e1a;padding:10px 18px;display:flex;align-items:center;gap:12px;flex-shrink:0}
    .hdr-logo{font-family:'VT323',monospace;font-size:26px;color:#6dbd6d;letter-spacing:5px}
    .hdr-sub{font-size:9px;color:#2a4a2a;letter-spacing:2px}
    .hdr-right{margin-left:auto;display:flex;align-items:center;gap:10px}
    .dot{width:7px;height:7px;border-radius:50%;background:#4a9a4a;box-shadow:0 0 7px #4a9a4a;animation:blink 2s infinite;display:none}
    .me-badge{font-size:10px;color:#4a7a4a;letter-spacing:1px;display:none}
    /* 管理者インジケーター（自分だけに見える） */
    .admin-indicator{font-size:10px;color:#7a4a2a;letter-spacing:2px;display:none;border:1px solid #4a2a1a;padding:2px 8px}
    .members-toggle{background:transparent;border:1px solid #2a4a2a;color:#4a7a4a;font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:1px;padding:4px 8px;cursor:pointer;display:none;transition:all .2s}
    .members-toggle:hover{color:#6dbd6d;border-color:#4a7a4a}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

    .screen{display:none;flex:1;min-height:0}
    .screen.on{display:flex}

    /* PASSWORD */
    #pw{flex-direction:column;align-items:center;justify-content:center;gap:22px;padding:40px 20px;overflow-y:auto}
    .pw-logo{font-family:'VT323',monospace;font-size:62px;color:#5aaa5a;letter-spacing:10px;text-shadow:0 0 28px rgba(90,170,90,.22)}
    .pw-desc{font-size:11px;color:#2a4a2a;letter-spacing:2px;text-align:center;line-height:2}
    .pw-form{display:flex;flex-direction:column;gap:11px;width:100%;max-width:340px}
    .lbl{font-size:10px;color:#2a4a2a;letter-spacing:3px}
    .lbl small{color:#1a3a1a;font-size:9px}
    .iw{position:relative;display:flex;align-items:center}
    .iw input{flex:1;padding-right:44px}
    .eye{position:absolute;right:0;width:40px;height:100%;background:transparent;border:none;color:#2a5a2a;cursor:pointer;font-family:'Share Tech Mono',monospace;font-size:10px;display:flex;align-items:center;justify-content:center;transition:color .2s}
    .eye:hover{color:#6dbd6d}
    input[type=password],input[type=text],textarea{font-family:'Share Tech Mono',monospace;outline:none;transition:border-color .2s}
    .pw-form input[type=password],.pw-form input[type=text]{width:100%;background:#0a120a;border:1px solid #1a3a1a;color:#7dbd7d;font-size:14px;padding:9px 13px}
    .pw-form input[type=password]{letter-spacing:5px}
    .pw-form input.nick{letter-spacing:1px}
    .pw-form input:focus{border-color:#3a7a3a}
    .saved-hint{font-size:10px;color:#3a6a3a;letter-spacing:1px}
    .sep{border:none;border-top:1px solid #152515;margin:2px 0}
    .err{font-size:11px;color:#7a3030;letter-spacing:2px;min-height:15px;text-align:center}
    .btn-enter{width:100%;background:transparent;border:1px solid #2a5a2a;color:#6dbd6d;font-family:'Share Tech Mono',monospace;font-size:13px;letter-spacing:4px;padding:10px;cursor:pointer;transition:all .2s}
    .btn-enter:hover{background:#0d1a0d;border-color:#4a8a4a}

    /* MAIN */
    #main{flex-direction:row}
    .main-left{display:flex;flex-direction:column;flex:1;min-width:0;min-height:0}
    .members-panel{width:180px;flex-shrink:0;border-left:1px solid #1a2e1a;background:#060b06;display:flex;flex-direction:column}
    .members-hdr{padding:10px 12px;border-bottom:1px solid #1a2e1a;font-size:10px;color:#2a4a2a;letter-spacing:3px;display:flex;align-items:center;gap:6px;flex-shrink:0}
    .online-badge{background:#0d1a0d;border:1px solid #1a3a1a;color:#4a9a4a;font-size:10px;padding:1px 7px;margin-left:auto}
    .members-list{flex:1;overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:4px;scrollbar-width:thin;scrollbar-color:#1a3a1a #060b06}
    .member-row{display:flex;align-items:center;gap:8px;padding:5px 6px;border:1px solid transparent;transition:all .15s;animation:pop .2s ease}
    .member-row:hover{border-color:#1a3a1a;background:#0a120a}
    .member-av{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:bold;flex-shrink:0;border:1px solid transparent}
    .member-name{font-size:11px;color:#3e6a3e;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
    .member-name.is-me{color:#6dbd6d}
    .member-dot{width:5px;height:5px;border-radius:50%;background:#3a8a3a;flex-shrink:0}
    /* 管理者用：メンバーのミュートボタン */
    .mute-btn{background:transparent;border:1px solid #3a1a1a;color:#6a3a3a;font-family:'Share Tech Mono',monospace;font-size:9px;padding:1px 5px;cursor:pointer;display:none;transition:all .15s;flex-shrink:0}
    .mute-btn:hover{background:#1a0a0a;color:#aa5a5a}
    .admin-mode .mute-btn{display:block}

    .tabs{display:flex;border-bottom:1px solid #1a2e1a;background:#060b06;flex-shrink:0}
    .tab{flex:1;padding:8px;font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:3px;color:#2a4a2a;background:transparent;border:none;cursor:pointer;transition:all .2s;border-bottom:2px solid transparent}
    .tab.active{color:#6dbd6d;border-bottom-color:#4a8a4a}
    .tab:hover:not(.active){color:#4a7a4a}
    .pane{display:none;flex:1;flex-direction:column;min-height:0}
    .pane.on{display:flex}

    /* CHAT */
    .chat-msgs{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:4px;scrollbar-width:thin;scrollbar-color:#1a3a1a #080c08;-webkit-overflow-scrolling:touch;min-height:0}
    .msg{display:flex;gap:9px;align-items:flex-start;animation:pop .16s ease;position:relative}
    @keyframes pop{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:none}}
    .avatar{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:bold;flex-shrink:0;margin-top:1px;border:1px solid transparent}
    .msg-meta{display:flex;flex-direction:column;gap:2px;flex:1;min-width:0}
    .msg-top{display:flex;align-items:baseline;gap:8px}
    .msg-name{font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:140px}
    .msg-name.me{color:#6dbd6d}
    .msg-name.other{color:#3e6a3e}
    .msg-name.sys{color:#2a4a5a}
    .msg-time{font-size:10px;color:#1e3e1e;flex-shrink:0}
    .msg-body{font-size:13px;color:#7aaa7a;line-height:1.5;word-break:break-word}
    .msg-body.sys{color:#2a4a5a;font-size:11px;font-style:italic}
    /* 管理者用削除ボタン */
    .del-btn{background:transparent;border:none;color:#3a1a1a;font-size:11px;cursor:pointer;padding:0 4px;display:none;position:absolute;right:0;top:0;transition:color .15s;font-family:'Share Tech Mono',monospace}
    .del-btn:hover{color:#aa4a4a}
    .admin-mode .msg:hover .del-btn{display:block}
    /* ミュートされたメッセージ */
    .msg.muted{opacity:0.3}

    .date-sep{display:flex;align-items:center;gap:10px;padding:6px 0;margin:4px 0}
    .date-sep-line{flex:1;border-top:1px solid #1a2a1a}
    .date-sep-text{font-size:10px;color:#1e3e2e;letter-spacing:2px;white-space:nowrap}
    .notice{font-size:11px;color:#1e4a2e;letter-spacing:1px;padding:2px 0 2px 36px;font-style:italic;animation:pop .2s ease}
    /* スパム警告 */
    .spam-warn{font-size:11px;color:#5a3a1a;letter-spacing:1px;padding:2px 0 2px 36px;font-style:italic;animation:pop .2s ease}

    .chat-bar{border-top:1px solid #1a2e1a;padding:9px 14px;display:flex;gap:8px;background:#060b06;flex-shrink:0}
    .ci{flex:1;background:#0a120a;border:1px solid #1a3a1a;color:#8ab88a;font-size:13px;padding:8px 11px;min-width:0}
    .ci:focus{border-color:#3a6a3a}
    .btn-send{background:transparent;border:1px solid #2a5a2a;color:#6dbd6d;font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:2px;padding:8px 14px;cursor:pointer;flex-shrink:0;transition:all .15s}
    .btn-send:hover{background:#0d1a0d}
    .btn-send:disabled{opacity:0.3;cursor:not-allowed}

    /* BBS */
    .bbs-posts{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:10px;scrollbar-width:thin;scrollbar-color:#1a3a1a #080c08;min-height:0}
    .post-card{background:#0a120a;border:1px solid #1a2e1a;padding:12px 14px;animation:pop .2s ease;position:relative}
    .post-hdr{display:flex;align-items:center;gap:9px;margin-bottom:8px}
    .post-avatar{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:bold;flex-shrink:0;border:1px solid transparent}
    .post-meta{display:flex;flex-direction:column;gap:1px;flex:1;min-width:0}
    .post-author{font-size:11px;color:#3e6a3e;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .post-author.me{color:#6dbd6d}
    .post-date{font-size:10px;color:#1e3e1e}
    .post-title{font-size:13px;color:#8aba8a;margin-bottom:5px;word-break:break-word}
    .post-body{font-size:12px;color:#5a8a5a;line-height:1.6;word-break:break-word}
    .post-del-btn{background:transparent;border:none;color:#3a1a1a;font-size:11px;cursor:pointer;position:absolute;right:10px;top:10px;display:none;font-family:'Share Tech Mono',monospace;transition:color .15s}
    .post-del-btn:hover{color:#aa4a4a}
    .admin-mode .post-card:hover .post-del-btn{display:block}

    .bbs-form{border-top:1px solid #1a2e1a;padding:10px 14px;background:#060b06;display:flex;flex-direction:column;gap:7px;flex-shrink:0}
    .bbs-ti{width:100%;background:#0a120a;border:1px solid #1a3a1a;color:#8ab88a;font-size:12px;padding:7px 11px}
    .bbs-ti:focus{border-color:#3a6a3a}
    .bbs-row{display:flex;gap:8px}
    .bbs-bi{flex:1;background:#0a120a;border:1px solid #1a3a1a;color:#8ab88a;font-size:12px;padding:7px 11px;resize:none;min-width:0;height:60px}
    .bbs-bi:focus{border-color:#3a6a3a}
    .btn-post{background:transparent;border:1px solid #2a5a2a;color:#6dbd6d;font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:1px;padding:8px 14px;cursor:pointer;flex-shrink:0;align-self:flex-end;transition:all .15s}
    .btn-post:hover{background:#0d1a0d}

    .av0{background:#0d1a16;border-color:#1a4a3a;color:#4a9a7a}
    .av1{background:#0d130d;border-color:#1a4a1a;color:#4a9a4a}
    .av2{background:#0d1520;border-color:#1a3a5a;color:#4a7aaa}
    .av3{background:#1a100d;border-color:#4a2a1a;color:#9a6a4a}
    .av4{background:#150d1a;border-color:#3a1a4a;color:#7a4a9a}
    .av5{background:#1a0d10;border-color:#4a1a2a;color:#9a4a5a}
    .sys-av{background:#0d1215;border-color:#1a2a35;color:#3a6a7a}

    @media(max-width:600px){
      .members-panel{position:fixed;top:0;right:0;bottom:0;z-index:150;width:160px;transform:translateX(100%);transition:transform .25s;display:flex}
      .members-panel.open{transform:translateX(0)}
      .members-toggle{display:block}
      .pw-logo{font-size:48px;letter-spacing:6px}
    }
  </style>
</head>
<body>
<div class="scanline"></div>
<div class="app" id="appRoot">

  <div class="hdr">
    <div>
      <div class="hdr-logo">ARPEGGIO</div>
      <div class="hdr-sub" id="hdrSub">ANONYMOUS COMMUNITY</div>
    </div>
    <div class="hdr-right">
      <span class="admin-indicator" id="adminIndicator">// OBSERVER MODE</span>
      <span class="me-badge" id="meBadge"></span>
      <button class="members-toggle" id="membersToggle">MEMBERS</button>
      <div class="dot" id="dot"></div>
    </div>
  </div>

  <!-- PASSWORD -->
  <div class="screen on" id="pw">
    <div class="pw-logo">ARPEGGIO</div>
    <div class="pw-desc">THIS SITE IS OPEN TO ANYONE<br>WHO KNOWS THE PASSWORD</div>
    <div class="pw-form">
      <div class="lbl">&gt; PASSWORD</div>
      <div class="iw">
        <input type="password" id="pwIn" placeholder="enter password..." autocomplete="off"/>
        <button class="eye" id="eyeBtn" tabindex="-1">SHOW</button>
      </div>
      <hr class="sep"/>
      <div class="lbl">&gt; NICKNAME <small>( OPTIONAL )</small></div>
      <input type="text" class="nick" id="nickIn" placeholder="未設定の場合は自動割り当て" maxlength="20" autocomplete="off"/>
      <div class="saved-hint" id="savedHint"></div>
      <div class="err" id="errMsg"></div>
      <button class="btn-enter" id="enterBtn">[ ENTER ]</button>
    </div>
  </div>

  <!-- MAIN -->
  <div class="screen" id="main">
    <div class="main-left">
      <div class="tabs">
        <button class="tab active" data-pane="chat">CHAT</button>
        <button class="tab" data-pane="bbs">BOARD</button>
      </div>
      <div class="pane on" id="chat">
        <div class="chat-msgs" id="chatMsgs"></div>
        <div class="chat-bar">
          <input class="ci" type="text" id="chatIn" placeholder="メッセージを入力..." maxlength="200"/>
          <button class="btn-send" id="sendBtn">SEND</button>
        </div>
      </div>
      <div class="pane" id="bbs">
        <div class="bbs-posts" id="bbsPosts"></div>
        <div class="bbs-form">
          <input class="bbs-ti" type="text" id="postTitle" placeholder="タイトルを入力..." maxlength="60"/>
          <div class="bbs-row">
            <textarea class="bbs-bi" id="postBody" placeholder="本文を入力... (Ctrl+Enterで投稿)" maxlength="500"></textarea>
            <button class="btn-post" id="postBtn">POST</button>
          </div>
        </div>
      </div>
    </div>

    <div class="members-panel" id="membersPanel">
      <div class="members-hdr">MEMBERS<span class="online-badge" id="onlineBadge">0</span></div>
      <div class="members-list" id="membersList"></div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, onValue, serverTimestamp, onDisconnect, set, remove }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const cfg = {
  apiKey:"AIzaSyCZKSGamG9fW93bYbRcoIPYEFIx7wrDLsE",
  authDomain:"arpeggio-bbs.firebaseapp.com",
  databaseURL:"https://arpeggio-bbs-default-rtdb.firebaseio.com",
  projectId:"arpeggio-bbs",
  storageBucket:"arpeggio-bbs.firebasestorage.app",
  messagingSenderId:"155564356931",
  appId:"1:155564356931:web:b2b82d9ff90d19a6a22bf6"
};
const db = getDatabase(initializeApp(cfg));

// ── パスワード設定 ──
const USER_PW  = 'arpeggio';
const ADMIN_PW = 'izaya';      // ← 管理者パスワード（変更可）

const adj  = ['Silent','Shadow','Phantom','Hollow','Neon','Crimson','Azure','Void','Static','Binary'];
const noun = ['Walker','Ghost','Drifter','Signal','Echo','Cipher','Specter','Node','Relay','Pulse'];
function randId(){ return adj[Math.floor(Math.random()*adj.length)]+noun[Math.floor(Math.random()*noun.length)]+'_'+(Math.floor(Math.random()*900)+100); }
function avClass(n){ if(!n) return 'sys-av'; let h=0; for(let c of n) h=(h*31+c.charCodeAt(0))&0xffff; return 'av'+(h%6); }
function avText(n){ return n?n.slice(0,2).toUpperCase():'SY'; }
function fmt(ts){ const d=ts?new Date(ts):new Date(); return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0'); }
function dateLabel(ts){ const d=ts?new Date(ts):new Date(); return d.getFullYear()+'/'+(d.getMonth()+1).toString().padStart(2,'0')+'/'+d.getDate().toString().padStart(2,'0'); }

let myName='', isAdmin=false, mutedUsers=new Set();
let lastSent=0; // スパム対策用タイムスタンプ
const SPAM_INTERVAL=3000; // 3秒

// 名前の保存・読み込み
const SAVED_KEY='arpeggio_nickname';
const savedName=localStorage.getItem(SAVED_KEY);
if(savedName){ document.getElementById('nickIn').value=savedName; document.getElementById('savedHint').textContent='// 前回の名前: '+savedName; }

function mkAv(name,cls='avatar'){
  const el=document.createElement('div'); el.className=cls+' '+avClass(name); el.textContent=avText(name); return el;
}

// ── チャット描画 ──
let lastDateLabel='';
function addChat(name,text,isMe,isSys,ts,msgKey){
  const msgs=document.getElementById('chatMsgs');
  if(!isSys){
    const dl=dateLabel(ts);
    if(dl!==lastDateLabel){
      lastDateLabel=dl;
      const sep=document.createElement('div'); sep.className='date-sep';
      const l1=document.createElement('div'); l1.className='date-sep-line';
      const l2=document.createElement('div'); l2.className='date-sep-line';
      const tx=document.createElement('div'); tx.className='date-sep-text'; tx.textContent=dl;
      sep.appendChild(l1); sep.appendChild(tx); sep.appendChild(l2);
      msgs.appendChild(sep);
    }
  }
  const isMuted=mutedUsers.has(name);
  const row=document.createElement('div'); row.className='msg'+(isMuted?' muted':'');
  if(msgKey) row.dataset.key=msgKey;

  const av=document.createElement('div'); av.className='avatar '+(isSys?'sys-av':avClass(name)); av.textContent=isSys?'SY':avText(name);
  const meta=document.createElement('div'); meta.className='msg-meta';
  const top=document.createElement('div'); top.className='msg-top';
  const nm=document.createElement('div'); nm.className='msg-name '+(isSys?'sys':isMe?'me':'other'); nm.textContent=isSys?'SYSTEM':name;
  const tm=document.createElement('div'); tm.className='msg-time'; tm.textContent=fmt(ts);
  top.appendChild(nm); top.appendChild(tm);
  const bd=document.createElement('div'); bd.className='msg-body'+(isSys?' sys':''); bd.textContent=text;
  meta.appendChild(top); meta.appendChild(bd);
  row.appendChild(av); row.appendChild(meta);

  // 管理者用削除ボタン
  if(msgKey && !isSys){
    const delBtn=document.createElement('button'); delBtn.className='del-btn'; delBtn.textContent='[×]';
    delBtn.addEventListener('click',()=>{ if(confirm('このメッセージを削除しますか？')) remove(ref(db,'messages/'+msgKey)); });
    row.appendChild(delBtn);
  }
  msgs.appendChild(row);
  msgs.scrollTop=msgs.scrollHeight;
}

function addNotice(text){ const msgs=document.getElementById('chatMsgs'); const el=document.createElement('div'); el.className='notice'; el.textContent=text; msgs.appendChild(el); msgs.scrollTop=msgs.scrollHeight; }
function addSpamWarn(){ const msgs=document.getElementById('chatMsgs'); const el=document.createElement('div'); el.className='spam-warn'; el.textContent='// 送信が早すぎます。少し待ってください。'; msgs.appendChild(el); msgs.scrollTop=msgs.scrollHeight; setTimeout(()=>el.remove(),2500); }

// ── 掲示板描画 ──
function renderPost(data,postKey){
  const isMe=data.author===myName;
  const card=document.createElement('div'); card.className='post-card';
  if(postKey) card.dataset.key=postKey;
  const hdr=document.createElement('div'); hdr.className='post-hdr';
  const av=mkAv(data.author,'post-avatar');
  const pmeta=document.createElement('div'); pmeta.className='post-meta';
  const pa=document.createElement('div'); pa.className='post-author'+(isMe?' me':''); pa.textContent=data.author;
  const pd=document.createElement('div'); pd.className='post-date'; pd.textContent=data.dateStr||'';
  pmeta.appendChild(pa); pmeta.appendChild(pd);
  hdr.appendChild(av); hdr.appendChild(pmeta);
  const title=document.createElement('div'); title.className='post-title'; title.textContent=data.title||'';
  card.appendChild(hdr); card.appendChild(title);
  if(data.body){ const body=document.createElement('div'); body.className='post-body'; body.textContent=data.body; card.appendChild(body); }

  // 管理者用削除ボタン
  if(postKey){
    const delBtn=document.createElement('button'); delBtn.className='post-del-btn'; delBtn.textContent='[×]';
    delBtn.addEventListener('click',()=>{ if(confirm('この投稿を削除しますか？')) remove(ref(db,'posts/'+postKey)); });
    card.appendChild(delBtn);
  }
  return card;
}

// ── メンバーリスト ──
let prevMembers={};
function updateMembers(snap){
  const list=document.getElementById('membersList');
  list.innerHTML='';
  const members=snap.exists()?snap.val():{};
  const keys=Object.keys(members);
  document.getElementById('onlineBadge').textContent=keys.length;
  document.getElementById('hdrSub').textContent='ANONYMOUS COMMUNITY  |  ONLINE: '+keys.length;

  if(myName){
    keys.forEach(k=>{ const name=members[k].name; if(name&&name!==myName&&!Object.values(prevMembers).find(m=>m.name===name)) addNotice('// '+name+' が入室しました'); });
    Object.values(prevMembers).forEach(m=>{ if(m.name&&m.name!==myName&&!keys.find(k=>members[k].name===m.name)) addNotice('// '+m.name+' が退出しました'); });
  }
  prevMembers=members;

  keys.sort((a,b)=>{ if(members[a].name===myName) return -1; if(members[b].name===myName) return 1; return 0; });
  keys.forEach(k=>{
    const name=members[k].name||'?';
    const isMe=name===myName;
    const isMuted=mutedUsers.has(name);
    const row=document.createElement('div'); row.className='member-row';
    const av=document.createElement('div'); av.className='member-av '+avClass(name); av.textContent=avText(name);
    const nm=document.createElement('div'); nm.className='member-name'+(isMe?' is-me':''); nm.textContent=isMe?name+' ★':name;
    const dot=document.createElement('div'); dot.className='member-dot';
    row.appendChild(av); row.appendChild(nm); row.appendChild(dot);

    // 管理者用ミュートボタン（自分以外に表示）
    if(!isMe){
      const muteBtn=document.createElement('button');
      muteBtn.className='mute-btn';
      muteBtn.textContent=isMuted?'UNMUTE':'MUTE';
      muteBtn.addEventListener('click',()=>{
        if(mutedUsers.has(name)){ mutedUsers.delete(name); } else { mutedUsers.add(name); }
        // ミュートされたメッセージを更新
        document.querySelectorAll('.msg').forEach(m=>{ if(m.querySelector('.msg-name')?.textContent===name) m.classList.toggle('muted',mutedUsers.has(name)); });
        updateMembers(snap);
      });
      row.appendChild(muteBtn);
    }
    list.appendChild(row);
  });
}

// ── タブ ──
document.querySelectorAll('.tab').forEach(t=>{ t.addEventListener('click',()=>{ document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active')); document.querySelectorAll('.pane').forEach(x=>x.classList.remove('on')); t.classList.add('active'); document.getElementById(t.dataset.pane).classList.add('on'); }); });

// スマホ：メンバーリスト開閉
const membersToggle=document.getElementById('membersToggle');
const membersPanel=document.getElementById('membersPanel');
membersToggle.addEventListener('click',e=>{ e.stopPropagation(); membersPanel.classList.toggle('open'); });
document.addEventListener('click',e=>{ if(!membersPanel.contains(e.target)&&e.target!==membersToggle) membersPanel.classList.remove('open'); });

// パスワード表示切替
const pwIn=document.getElementById('pwIn');
document.getElementById('eyeBtn').addEventListener('click',()=>{ const h=pwIn.type==='password'; pwIn.type=h?'text':'password'; document.getElementById('eyeBtn').textContent=h?'HIDE':'SHOW'; });

// ── 入室 ──
function enter(){
  const pw=pwIn.value.trim().toLowerCase();
  const nick=document.getElementById('nickIn').value.trim();

  if(pw===ADMIN_PW){
    isAdmin=true;
  } else if(pw===USER_PW){
    isAdmin=false;
  } else {
    document.getElementById('errMsg').textContent='// INVALID PASSWORD';
    pwIn.value=''; return;
  }

  myName=nick||randId();
  localStorage.setItem(SAVED_KEY,myName);

  document.getElementById('pw').classList.remove('on');
  document.getElementById('main').classList.add('on');
  document.getElementById('dot').style.display='block';
  document.getElementById('meBadge').textContent=myName;
  document.getElementById('meBadge').style.display='block';

  // 管理者モード適用
  if(isAdmin){
    document.getElementById('appRoot').classList.add('admin-mode');
    document.getElementById('adminIndicator').style.display='block';
  }

  addChat('','ARPEGGIOに接続しました。',false,true,null,null);
  addChat('','あなたのIDは '+myName+' です。',false,true,null,null);
  if(isAdmin) addChat('','// OBSERVER MODE — すべての操作が可能です。',false,true,null,null);

  // presence
  const pr=ref(db,'presence/'+myName+'_'+Date.now());
  set(pr,{name:myName}); onDisconnect(pr).remove();
  onValue(ref(db,'presence'),snap=>updateMembers(snap));

  // chat 差分更新
  let rendered=new Set();
  onValue(ref(db,'messages'),snap=>{
    if(!snap.exists()) return;
    snap.forEach(c=>{
      if(rendered.has(c.key)) return;
      rendered.add(c.key);
      const d=c.val();
      addChat(d.name,d.text,d.name===myName,false,d.ts,c.key);
    });
    // 削除されたメッセージをDOMから消す
    document.querySelectorAll('.msg[data-key]').forEach(el=>{
      if(!snap.child(el.dataset.key).exists()) el.remove();
    });
  });

  // bbs 差分更新
  let bbsRendered=new Set();
  onValue(ref(db,'posts'),snap=>{
    const container=document.getElementById('bbsPosts');
    // 削除されたカードをDOMから消す
    document.querySelectorAll('.post-card[data-key]').forEach(el=>{ if(!snap||!snap.child(el.dataset.key).exists()) el.remove(); });
    if(!snap.exists()){
      if(bbsRendered.size===0){ container.innerHTML=''; const e=document.createElement('div'); e.style.cssText='color:#1e3e1e;font-size:11px;letter-spacing:2px;padding:20px;text-align:center'; e.textContent='// NO POSTS YET'; container.appendChild(e); }
      return;
    }
    if(bbsRendered.size===0){
      container.innerHTML='';
      const posts=[]; snap.forEach(c=>posts.push({key:c.key,val:c.val()}));
      posts.reverse().forEach(p=>{ bbsRendered.add(p.key); container.appendChild(renderPost(p.val,p.key)); });
    } else {
      snap.forEach(c=>{ if(bbsRendered.has(c.key)) return; bbsRendered.add(c.key); container.insertBefore(renderPost(c.val(),c.key),container.firstChild); });
    }
  });

  document.getElementById('chatIn').addEventListener('focus',()=>{ setTimeout(()=>{ document.getElementById('chatMsgs').scrollTop=document.getElementById('chatMsgs').scrollHeight; },300); });
}

document.getElementById('enterBtn').addEventListener('click',enter);
pwIn.addEventListener('keydown',e=>{ if(e.key==='Enter') document.getElementById('nickIn').focus(); });
document.getElementById('nickIn').addEventListener('keydown',e=>{ if(e.key==='Enter') enter(); });

// ── チャット送信（スパム対策付き） ──
function sendChat(){
  const el=document.getElementById('chatIn');
  const text=el.value.trim(); if(!text) return;
  const now=Date.now();
  if(!isAdmin && now-lastSent<SPAM_INTERVAL){ addSpamWarn(); return; }
  lastSent=now;
  push(ref(db,'messages'),{name:myName,text,ts:serverTimestamp()});
  el.value='';
}
document.getElementById('sendBtn').addEventListener('click',sendChat);
document.getElementById('chatIn').addEventListener('keydown',e=>{ if(e.key==='Enter') sendChat(); });

// ── 掲示板投稿 ──
function sendPost(){
  const titleEl=document.getElementById('postTitle'); const bodyEl=document.getElementById('postBody');
  const title=titleEl.value.trim(); if(!title) return;
  const body=bodyEl.value.trim();
  const now=new Date();
  const dateStr=now.getFullYear()+'/'+(now.getMonth()+1).toString().padStart(2,'0')+'/'+now.getDate().toString().padStart(2,'0')+' '+String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
  push(ref(db,'posts'),{author:myName,title,body,dateStr,ts:serverTimestamp()});
  titleEl.value=''; bodyEl.value='';
}
document.getElementById('postBtn').addEventListener('click',sendPost);
document.getElementById('postBody').addEventListener('keydown',e=>{ if(e.key==='Enter'&&e.ctrlKey) sendPost(); });
</script>
</body>
