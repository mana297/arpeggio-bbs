<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ARPEGGIO BBS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #050905;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Share Tech Mono', monospace;
      color: #a8c8a8;
    }

    .container {
      width: 100%;
      max-width: 760px;
      min-height: 100vh;
      background: #080c08;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }

    .scanline {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(0,0,0,0.04) 2px, rgba(0,0,0,0.04) 4px
      );
      pointer-events: none;
      z-index: 100;
    }

    /* ── HEADER ── */
    .header {
      background: #060b06;
      border-bottom: 1px solid #1e2e1e;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    .logo {
      font-family: 'VT323', monospace;
      font-size: 28px;
      color: #6dbd6d;
      letter-spacing: 5px;
    }
    .subtitle {
      font-size: 10px;
      color: #2e4e2e;
      letter-spacing: 2px;
    }
    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #4a9a4a;
      margin-left: auto;
      box-shadow: 0 0 8px #4a9a4a;
      animation: blink 2s infinite;
      display: none;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

    /* ── SCREENS ── */
    .screen { display: none; flex: 1; }
    .screen.active { display: flex; }

    /* ── PASSWORD SCREEN ── */
    #pwScreen {
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 28px;
      padding: 60px 20px;
    }
    .pw-title {
      font-family: 'VT323', monospace;
      font-size: 64px;
      color: #5aaa5a;
      letter-spacing: 10px;
      text-shadow: 0 0 30px rgba(90,170,90,0.25);
    }
    .pw-desc {
      font-size: 11px;
      color: #2e4e2e;
      letter-spacing: 2px;
      text-align: center;
      line-height: 2;
    }
    .pw-form {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
      max-width: 340px;
    }
    .field-label {
      font-size: 10px;
      color: #2e4e2e;
      letter-spacing: 3px;
    }
    .field-label span {
      color: #1e3e1e;
      font-size: 9px;
    }
    input[type="password"],
    input[type="text"] {
      width: 100%;
      background: #0a120a;
      border: 1px solid #1e3e1e;
      color: #7dbd7d;
      font-family: 'Share Tech Mono', monospace;
      font-size: 15px;
      padding: 10px 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="password"] { letter-spacing: 5px; }
    input[type="text"] { letter-spacing: 1px; }
    input:focus { border-color: #3a7a3a; }
    .divider { border: none; border-top: 1px solid #1a2e1a; margin: 4px 0; }
    .err-msg {
      font-size: 11px;
      color: #7a3030;
      letter-spacing: 2px;
      min-height: 16px;
      text-align: center;
    }
    .enter-btn {
      width: 100%;
      background: transparent;
      border: 1px solid #2e5e2e;
      color: #6dbd6d;
      font-family: 'Share Tech Mono', monospace;
      font-size: 13px;
      letter-spacing: 4px;
      padding: 11px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .enter-btn:hover { background: #0f1e0f; border-color: #4a8a4a; }
    .enter-btn:active { transform: scale(0.99); }

    /* ── CHAT SCREEN ── */
    #chatScreen { flex-direction: column; }

    .info-bar {
      background: #060b06;
      border-bottom: 1px solid #1a2e1a;
      padding: 6px 18px;
      display: flex;
      gap: 14px;
      align-items: center;
      font-size: 10px;
      color: #2e4e2e;
      letter-spacing: 1px;
      flex-shrink: 0;
    }
    .info-bar .my-name { color: #6dbd6d; }
    .info-bar .online { margin-left: auto; }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 14px 18px;
      display: flex;
      flex-direction: column;
      gap: 5px;
      scrollbar-width: thin;
      scrollbar-color: #1a3a1a #080c08;
    }

    .msg {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      animation: appear 0.18s ease;
    }
    @keyframes appear { from{opacity:0;transform:translateY(3px)} to{opacity:1;transform:none} }

    .msg-time {
      font-size: 10px;
      color: #1e3e1e;
      min-width: 46px;
      padding-top: 2px;
      flex-shrink: 0;
    }
    .msg-name {
      font-size: 11px;
      min-width: 110px;
      max-width: 110px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      padding-top: 2px;
      flex-shrink: 0;
    }
    .msg-name.me { color: #6dbd6d; }
    .msg-name.other { color: #3e6e3e; }
    .msg-name.sys { color: #2e4e5e; }
    .msg-body { font-size: 13px; color: #7aaa7a; line-height: 1.55; word-break: break-word; }
    .msg-body.sys { color: #2e4e5e; font-size: 11px; font-style: italic; }

    .input-area {
      border-top: 1px solid #1a2e1a;
      padding: 10px 16px;
      display: flex;
      gap: 8px;
      background: #060b06;
      flex-shrink: 0;
    }
    .chat-input {
      flex: 1;
      background: #0a120a;
      border: 1px solid #1e3e1e;
      color: #8ab88a;
      font-family: 'Share Tech Mono', monospace;
      font-size: 13px;
      padding: 8px 12px;
      outline: none;
    }
    .chat-input:focus { border-color: #3a6a3a; }
    .send-btn {
      background: transparent;
      border: 1px solid #2e5e2e;
      color: #6dbd6d;
      font-family: 'Share Tech Mono', monospace;
      font-size: 12px;
      letter-spacing: 2px;
      padding: 8px 18px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .send-btn:hover { background: #0f1e0f; }
  </style>
</head>
<body>
<div class="scanline"></div>
<div class="container">

  <!-- HEADER -->
  <div class="header">
    <div>
      <div class="logo">ARPEGGIO</div>
      <div class="subtitle">ANONYMOUS COMMUNITY BULLETIN BOARD</div>
    </div>
    <div class="status-dot" id="dot"></div>
  </div>

  <!-- PASSWORD SCREEN -->
  <div class="screen active" id="pwScreen">
    <div class="pw-title">ARPEGGIO</div>
    <div class="pw-desc">
      THIS SITE IS OPEN TO ANYONE<br>
      WHO KNOWS THE PASSWORD
    </div>
    <div class="pw-form">
      <div class="field-label">&gt; PASSWORD</div>
      <input type="password" id="pwInput" placeholder="enter password..." autocomplete="off"/>
      <hr class="divider"/>
      <div class="field-label">&gt; NICKNAME <span>( OPTIONAL )</span></div>
      <input type="text" id="nickInput" placeholder="未設定の場合は自動割り当て" maxlength="20" autocomplete="off"/>
      <div class="err-msg" id="errMsg"></div>
      <button class="enter-btn" id="enterBtn">[ ENTER ]</button>
    </div>
  </div>

  <!-- CHAT SCREEN -->
  <div class="screen" id="chatScreen">
    <div class="info-bar">
      <span>ARPEGGIO BBS</span>
      <span>|</span>
      <span>YOU: <span class="my-name" id="myNameDisp"></span></span>
      <span class="online" id="onlineCount">ONLINE: —</span>
    </div>
    <div class="messages" id="msgs"></div>
    <div class="input-area">
      <input class="chat-input" type="text" id="chatInput" placeholder="メッセージを入力..." maxlength="200"/>
      <button class="send-btn" id="sendBtn">SEND</button>
    </div>
  </div>

</div>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, push, onValue, serverTimestamp, onDisconnect, set, remove }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  // ── Firebase設定 ──
  const firebaseConfig = {
    apiKey: "AIzaSyCZKSGamG9fW93bYbRcoIPYEFIx7wrDLsE",
    authDomain: "arpeggio-bbs.firebaseapp.com",
    databaseURL: "https://arpeggio-bbs-default-rtdb.firebaseio.com",
    projectId: "arpeggio-bbs",
    storageBucket: "arpeggio-bbs.firebasestorage.app",
    messagingSenderId: "155564356931",
    appId: "1:155564356931:web:b2b82d9ff90d19a6a22bf6"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getDatabase(app);

  // ── 匿名ID生成 ──
  const adjectives = ['Silent','Shadow','Phantom','Hollow','Neon','Crimson','Azure','Void'];
  const nouns      = ['Walker','Ghost','Drifter','Signal','Echo','Cipher','Specter','Node'];
  function randomId() {
    const a = adjectives[Math.floor(Math.random()*adjectives.length)];
    const n = nouns[Math.floor(Math.random()*nouns.length)];
    const d = Math.floor(Math.random()*900)+100;
    return `${a}${n}_${d}`;
  }

  let myName = '';
  let presenceRef = null;

  // ── 時刻フォーマット ──
  function fmt(ts) {
    const d = ts ? new Date(ts) : new Date();
    return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
  }

  // ── メッセージ表示 ──
  function addMsg(name, text, isMe, isSys) {
    const msgs = document.getElementById('msgs');
    const row  = document.createElement('div');
    row.className = 'msg';

    const t = document.createElement('div'); t.className='msg-time'; t.textContent=fmt();
    const n = document.createElement('div');
    n.className = 'msg-name '+(isSys?'sys':isMe?'me':'other');
    n.textContent = isSys ? 'SYSTEM' : name;
    const b = document.createElement('div');
    b.className = 'msg-body'+(isSys?' sys':'');
    b.textContent = text;

    row.appendChild(t); row.appendChild(n); row.appendChild(b);
    msgs.appendChild(row);
    msgs.scrollTop = msgs.scrollHeight;
  }

  // ── 入室処理 ──
  document.getElementById('enterBtn').addEventListener('click', enter);
  document.getElementById('pwInput').addEventListener('keydown', e=>{ if(e.key==='Enter') document.getElementById('nickInput').focus(); });
  document.getElementById('nickInput').addEventListener('keydown', e=>{ if(e.key==='Enter') enter(); });

  function enter() {
    const pw   = document.getElementById('pwInput').value.trim().toLowerCase();
    const nick = document.getElementById('nickInput').value.trim();

    if (pw !== 'arpeggio') {
      document.getElementById('errMsg').textContent = '// INVALID PASSWORD';
      document.getElementById('pwInput').value = '';
      return;
    }

    myName = nick || randomId();

    // 画面切り替え
    document.getElementById('pwScreen').classList.remove('active');
    document.getElementById('chatScreen').classList.add('active');
    document.getElementById('dot').style.display = 'block';
    document.getElementById('myNameDisp').textContent = myName;

    // システムメッセージ
    addMsg('','ARPEGGIOに接続しました。',false,true);
    addMsg('','あなたのIDは '+myName+' です。',false,true);

    // ── オンライン人数 (presence) ──
    const presencePath = ref(db, `presence/${myName}_${Date.now()}`);
    presenceRef = presencePath;
    set(presencePath, { name: myName, online: true });
    onDisconnect(presencePath).remove();

    onValue(ref(db,'presence'), snap=>{
      const count = snap.exists() ? Object.keys(snap.val()).length : 0;
      document.getElementById('onlineCount').textContent = 'ONLINE: '+count;
    });

    // ── メッセージ受信 ──
    const msgsRef = ref(db,'messages');
    onValue(msgsRef, snap=>{
      if (!snap.exists()) return;
      document.getElementById('msgs').innerHTML = '';
      addMsg('','ARPEGGIOに接続しました。',false,true);
      addMsg('','あなたのIDは '+myName+' です。',false,true);
      snap.forEach(child=>{
        const d = child.val();
        addMsg(d.name, d.text, d.name===myName, false);
      });
    });
  }

  // ── メッセージ送信 ──
  function send() {
    const input = document.getElementById('chatInput');
    const text  = input.value.trim();
    if (!text) return;
    push(ref(db,'messages'), {
      name: myName,
      text: text,
      ts: serverTimestamp()
    });
    input.value = '';
  }

  document.getElementById('sendBtn').addEventListener('click', send);
  document.getElementById('chatInput').addEventListener('keydown', e=>{ if(e.key==='Enter') send(); });
</script>
</body>
</html>
